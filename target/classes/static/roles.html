<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>角色管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="layout-body">
    <div class="layout">
        <div class="sidebar">
            <div class="logo">
                <h2>进销存系统</h2>
            </div>
            <ul class="menu">
                <li><a href="dashboard.html" class="menu-item">🏠 首页</a></li>
                <li><a href="departments.html" class="menu-item">🏢 部门管理</a></li>
                <li><a href="users.html" class="menu-item">👥 用户管理</a></li>
                <li><a href="roles.html" class="menu-item active">🎭 角色管理</a></li>
            </ul>
        </div>
        <div class="main-content">
            <div class="top-header">
                <div class="breadcrumb">系统管理 / 角色管理</div>
                <div class="user-area">
                    <span id="userDisplay"></span>
                    <button class="btn btn-danger btn-sm" onclick="logout()">退出登录</button>
                </div>
            </div>
            <div class="page-content">
                <div class="card">
                    <div class="toolbar">
                        <button class="btn btn-primary" onclick="openAddModal()">+ 新增</button>
                    </div>

                    <p id="listMsg" class="message"></p>

                    <table class="table role-table">
                        <thead>
                            <tr>
                                <th>角色编号</th>
                                <th>角色名称</th>
                                <th>权限字符</th>
                                <th>显示顺序</th>
                                <th>状态</th>
                                <th>备注</th>
                                <th>创建时间</th>
                            </tr>
                        </thead>
                        <tbody id="roleTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="roleModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalTitle">新增角色</span>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>角色名称：<span class="required">*</span></label>
                        <input type="text" id="formName" class="form-input" placeholder="请输入角色名称">
                    </div>
                    <div class="form-group">
                        <label>权限字符：<span class="required">*</span></label>
                        <input type="text" id="formRoleKey" class="form-input" placeholder="请输入权限字符">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>显示顺序：</label>
                        <input type="number" id="formSort" class="form-input" value="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>状态：</label>
                        <select id="formStatus" class="form-input">
                            <option value="0">正常</option>
                            <option value="1">停用</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" style="width:100%;">
                        <label>备注：</label>
                        <textarea id="formRemark" class="form-input" rows="3" placeholder="请输入备注" style="width:100%;resize:vertical;"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="submitForm()">确定</button>
            </div>
        </div>
    </div>

    <script>
        var currentUser = null;
        try {
            currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        } catch (e) {}

        if (!currentUser || !currentUser.id) {
            window.location.href = 'index.html';
        } else {
            var roleText = currentUser.role === 'ADMIN' ? '超级管理员' : '普通用户';
            var roleClass = currentUser.role === 'ADMIN' ? 'role-admin' : 'role-user';
            document.getElementById('userDisplay').innerHTML =
                '欢迎，<strong>' + currentUser.username + '</strong> <span class="role-tag ' + roleClass + '">' + roleText + '</span> &nbsp; ';
        }

        function logout() {
            fetch('/api/user/logout', { method: 'POST', credentials: 'include' });
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        function showMsg(text, type) {
            var msg = document.getElementById('listMsg');
            msg.textContent = text;
            msg.className = 'message ' + (type || 'success');
            if (text) {
                setTimeout(function() {
                    msg.textContent = '';
                    msg.className = 'message';
                }, 3000);
            }
        }

        function formatDateTime(datetime) {
            if (!datetime) return '';
            datetime = datetime.replace('T', ' ').substring(0, 19);
            return datetime;
        }

        function loadRoles() {
            fetch('/api/system/role/list', {
                credentials: 'include'
            })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    if (!result.success) {
                        if (result.message === '请先登录') {
                            window.location.href = 'index.html';
                            return;
                        }
                        showMsg(result.message, 'error');
                        return;
                    }
                    var list = result.data || [];
                    renderRoleList(list);
                })
                .catch(function() {
                    showMsg('加载失败', 'error');
                });
        }

        function renderRoleList(list) {
            var tbody = document.getElementById('roleTableBody');
            tbody.innerHTML = '';
            if (list.length === 0) {
                var tr = document.createElement('tr');
                tr.innerHTML = '<td colspan="7" style="text-align:center; color:#909399; padding:40px 0;">暂无数据</td>';
                tbody.appendChild(tr);
                return;
            }

            list.forEach(function(role) {
                var tr = document.createElement('tr');
                var isEnabled = role.status === '0';
                var statusClass = isEnabled ? 'status-normal' : 'status-disabled';
                var statusText = isEnabled ? '正常' : '停用';
                var statusHtml = '<span class="status-tag ' + statusClass + '">' + statusText + '</span>';

                tr.innerHTML =
                    '<td>' + role.id + '</td>' +
                    '<td>' + (role.name || '') + '</td>' +
                    '<td><code style="background:#f5f5f5; padding:2px 6px; border-radius:3px; color:#c7254e;">' + (role.roleKey || '') + '</code></td>' +
                    '<td>' + (role.sort != null ? role.sort : 0) + '</td>' +
                    '<td>' + statusHtml + '</td>' +
                    '<td>' + (role.remark || '') + '</td>' +
                    '<td>' + formatDateTime(role.createTime) + '</td>';
                tbody.appendChild(tr);
            });
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = '新增角色';
            document.getElementById('formName').value = '';
            document.getElementById('formRoleKey').value = '';
            document.getElementById('formSort').value = '0';
            document.getElementById('formStatus').value = '0';
            document.getElementById('formRemark').value = '';
            document.getElementById('roleModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('roleModal').style.display = 'none';
        }

        function submitForm() {
            var name = document.getElementById('formName').value.trim();
            var roleKey = document.getElementById('formRoleKey').value.trim();
            if (!name) {
                showMsg('请输入角色名称', 'error');
                return;
            }
            if (!roleKey) {
                showMsg('请输入权限字符', 'error');
                return;
            }
            var data = {
                name: name,
                roleKey: roleKey,
                sort: parseInt(document.getElementById('formSort').value) || 0,
                status: document.getElementById('formStatus').value,
                remark: document.getElementById('formRemark').value.trim()
            };
            fetch('/api/system/role/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(data)
            })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    showMsg(result.message, result.success ? 'success' : 'error');
                    if (result.success) {
                        closeModal();
                        loadRoles();
                    }
                });
        }

        window.onclick = function(event) {
            var modal = document.getElementById('roleModal');
            if (event.target == modal) {
                closeModal();
            }
        };

        loadRoles();
    </script>
</body>
</html>
