<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="layout-body">
    <div class="layout">
        <div class="sidebar">
            <div class="logo">
                <h2>进销存系统</h2>
            </div>
            <ul class="menu">
                <li><a href="dashboard.html" class="menu-item">🏠 首页</a></li>
                <li><a href="departments.html" class="menu-item">🏢 部门管理</a></li>
                <li><a href="users.html" class="menu-item active">👥 用户管理</a></li>
            </ul>
        </div>
        <div class="main-content">
            <div class="top-header">
                <div class="breadcrumb">系统管理 / 用户管理</div>
                <div class="user-area">
                    <span id="userDisplay"></span>
                    <button class="btn btn-danger btn-sm" onclick="logout()">退出登录</button>
                </div>
            </div>
            <div class="page-content">
                <div class="card">
                    <div class="search-bar">
                        <div class="search-item">
                            <label>用户名称：</label>
                            <input type="text" id="searchUsername" placeholder="请输入用户名称" class="search-input">
                        </div>
                        <div class="search-item">
                            <label>手机号码：</label>
                            <input type="text" id="searchPhone" placeholder="请输入手机号码" class="search-input">
                        </div>
                        <div class="search-item">
                            <label>状态：</label>
                            <select id="searchStatus" class="search-select">
                                <option value="all" selected>用户状态</option>
                                <option value="0">启用</option>
                                <option value="1">禁用</option>
                            </select>
                        </div>
                        <div class="search-item">
                            <label>创建时间：</label>
                            <div class="date-range">
                                <input type="date" id="searchStartDate" class="search-input" placeholder="开始日期" onfocus="this.placeholder=''" onblur="this.placeholder='开始日期'">
                                <span class="date-separator">至</span>
                                <input type="date" id="searchEndDate" class="search-input" placeholder="结束日期" onfocus="this.placeholder=''" onblur="this.placeholder='结束日期'">
                            </div>
                        </div>
                        <div class="search-actions">
                            <button class="btn btn-primary" onclick="searchUsers()">🔍 搜索</button>
                            <button class="btn btn-default" onclick="resetSearch()">🔄 重置</button>
                        </div>
                    </div>

                    <p id="listMsg" class="message"></p>

                    <table class="table user-table">
                        <thead>
                            <tr>
                            <th>用户编号</th>
                            <th>用户名称</th>
                            <th>用户昵称</th>
                            <th>部门</th>
                            <th>手机号码</th>
                            <th>状态</th>
                            <th>创建时间</th>
                        </tr>
                        </thead>
                        <tbody id="userTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal detail-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>用户详情</span>
                <span class="close" onclick="closeDetailModal()">&times;</span>
            </div>
            <div class="modal-body" id="detailBody">
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeDetailModal()">关闭</button>
            </div>
        </div>
    </div>

    <script>
        var currentUser = null;
        try {
            currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        } catch (e) {}

        if (!currentUser || !currentUser.id) {
            window.location.href = 'index.html';
        } else {
            var roleText = currentUser.role === 'ADMIN' ? '超级管理员' : '普通用户';
            var roleClass = currentUser.role === 'ADMIN' ? 'role-admin' : 'role-user';
            document.getElementById('userDisplay').innerHTML =
                '欢迎，<strong>' + currentUser.username + '</strong> <span class="role-tag ' + roleClass + '">' + roleText + '</span> &nbsp; ';
        }

        function logout() {
            fetch('/api/user/logout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        function showMsg(text, type) {
            var msg = document.getElementById('listMsg');
            msg.textContent = text;
            msg.className = 'message ' + (type || 'success');
            if (text) {
                setTimeout(function() {
                    msg.textContent = '';
                    msg.className = 'message';
                }, 3000);
            }
        }

        function formatDateTime(datetime) {
            if (!datetime) return '';
            datetime = datetime.replace('T', ' ').substring(0, 19);
            return datetime;
        }

        function loadUsers() {
            var username = document.getElementById('searchUsername').value;
            var phone = document.getElementById('searchPhone').value;
            var status = document.getElementById('searchStatus').value;
            var startTime = document.getElementById('searchStartDate').value;
            var endTime = document.getElementById('searchEndDate').value;

            var params = {};
            if (username) params.username = username;
            if (phone) params.phone = phone;
            if (status) params.status = status;
            if (startTime) params.startTime = startTime;
            if (endTime) params.endTime = endTime;

            fetch('/api/user/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(params)
            })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    if (!result.success) {
                        showMsg(result.message, 'error');
                        return;
                    }
                    var data = result.data || {};
                    var list = data.list || [];
                    renderUserList(list);
                })
                .catch(function() {
                    showMsg('加载失败', 'error');
                });
        }

        function renderUserList(list) {
            var tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';
            if (list.length === 0) {
                var tr = document.createElement('tr');
                tr.innerHTML = '<td colspan="7" style="text-align:center; color:#909399; padding:40px 0;">暂无数据</td>';
                tbody.appendChild(tr);
                return;
            }

            list.forEach(function(user) {
                var tr = document.createElement('tr');
                var isEnabled = user.status === '0';
                var statusHtml = '<label class="switch">' +
                    '<input type="checkbox" ' + (isEnabled ? 'checked' : '') +
                    ' data-user-id="' + user.id + '"' +
                    ' onclick="return changeUserStatus(this, event)">' +
                    '<span class="switch-slider"></span>' +
                    '</label>';

                var deptName = user.deptName || '未分配';

                tr.innerHTML =
                    '<td>' + user.id + '</td>' +
                    '<td><a class="username-link" onclick="viewUserDetail(' + user.id + ')">' +
                    (user.username || '') + '</a></td>' +
                    '<td>' + (user.nickname || user.realName || '') + '</td>' +
                    '<td>' + deptName + '</td>' +
                    '<td>' + (user.phone || '') + '</td>' +
                    '<td>' + statusHtml + '</td>' +
                    '<td>' + formatDateTime(user.createTime) + '</td>';
                tbody.appendChild(tr);
            });
        }

        function searchUsers() {
            loadUsers();
        }

        function resetSearch() {
            document.getElementById('searchUsername').value = '';
            document.getElementById('searchPhone').value = '';
            document.getElementById('searchStatus').value = 'all';
            document.getElementById('searchStartDate').value = '';
            document.getElementById('searchEndDate').value = '';
            loadUsers();
        }

        function changeUserStatus(checkbox, event) {
            event.preventDefault();
            var userId = parseInt(checkbox.getAttribute('data-user-id'));
            var targetChecked = checkbox.checked;
            var newStatus = targetChecked ? '0' : '1';
            var action = targetChecked ? '启用' : '禁用';
            if (!confirm('确定要' + action + '该用户吗？')) {
                return false;
            }
            fetch('/api/user/changeStatus', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: userId, status: newStatus })
            })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    showMsg(result.message, result.success ? 'success' : 'error');
                    if (result.success) {
                        checkbox.checked = targetChecked;
                    }
                })
                .catch(function() {
                    showMsg('操作失败', 'error');
                });
            return false;
        }

        function viewUserDetail(userId) {
            fetch('/api/user/' + userId)
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    if (!result.success || !result.data) {
                        showMsg('获取用户详情失败', 'error');
                        return;
                    }
                    var user = result.data;
                    var roleText = user.role === 'ADMIN' ? '超级管理员' : '普通用户';
                    var statusText = user.status === '0' ? '启用' : '禁用';
                    var deptName = user.deptName || '未分配';

                    var html = '';
                    html += '<div class="detail-item"><span class="detail-label">用户编号：</span><span class="detail-value">' + user.id + '</span></div>';
                    html += '<div class="detail-item"><span class="detail-label">登录账号：</span><span class="detail-value">' + (user.username || '') + '</span></div>';
                    html += '<div class="detail-item"><span class="detail-label">用户昵称：</span><span class="detail-value">' + (user.nickname || '') + '</span></div>';
                    html += '<div class="detail-item"><span class="detail-label">用户姓名：</span><span class="detail-value">' + (user.realName || '') + '</span></div>';
                    html += '<div class="detail-item"><span class="detail-label">所属部门：</span><span class="detail-value">' + deptName + '</span></div>';
                    html += '<div class="detail-item"><span class="detail-label">手机号码：</span><span class="detail-value">' + (user.phone || '') + '</span></div>';
                    html += '<div class="detail-item"><span class="detail-label">邮箱：</span><span class="detail-value">' + (user.email || '') + '</span></div>';
                    html += '<div class="detail-item"><span class="detail-label">角色：</span><span class="detail-value">' + roleText + '</span></div>';
                    html += '<div class="detail-item"><span class="detail-label">状态：</span><span class="detail-value">' + statusText + '</span></div>';
                    html += '<div class="detail-item"><span class="detail-label">创建时间：</span><span class="detail-value">' + formatDateTime(user.createTime) + '</span></div>';

                    document.getElementById('detailBody').innerHTML = html;
                    document.getElementById('detailModal').style.display = 'block';
                });
        }

        function closeDetailModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        window.onclick = function(event) {
            var modal = document.getElementById('detailModal');
            if (event.target == modal) {
                closeDetailModal();
            }
        };

        loadUsers();
    </script>
</body>
</html>
