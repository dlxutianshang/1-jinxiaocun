<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>部门管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="layout-body">
    <div class="layout">
        <div class="sidebar">
            <div class="logo">
                <h2>进销存系统</h2>
            </div>
            <ul class="menu">
                <li><a href="dashboard.html" class="menu-item">🏠 首页</a></li>
                <li><a href="departments.html" class="menu-item active">🏢 部门管理</a></li>
                <li><a href="users.html" class="menu-item">👥 用户管理</a></li>
            </ul>
        </div>
        <div class="main-content">
            <div class="top-header">
                <div class="breadcrumb">系统管理 / 部门管理</div>
                <div class="user-area">
                    <span id="userDisplay"></span>
                    <button class="btn btn-danger btn-sm" onclick="logout()">退出登录</button>
                </div>
            </div>
            <div class="page-content">
                <div class="card">
                    <div class="search-bar">
                        <div class="search-item">
                            <label>部门名称：</label>
                            <input type="text" id="searchName" placeholder="请输入部门名称" class="search-input">
                        </div>
                        <div class="search-item">
                            <label>状态：</label>
                            <select id="searchStatus" class="search-select">
                                <option value="">部门状态</option>
                                <option value="all">全部</option>
                                <option value="0">正常</option>
                                <option value="1">禁用</option>
                            </select>
                        </div>
                        <div class="search-actions">
                            <button class="btn btn-primary" onclick="searchDept()">🔍 搜索</button>
                            <button class="btn btn-default" onclick="resetSearch()">🔄 重置</button>
                        </div>
                    </div>

                    <div class="toolbar">
                        <button class="btn btn-primary" onclick="openAddModal(0)">+ 新增</button>
                        <button class="btn btn-warning" onclick="saveOrder()">💾 保存排序</button>
                        <button class="btn btn-default" id="toggleBtn" onclick="toggleAll()">📂 展开/折叠</button>
                    </div>

                    <p id="listMsg" class="message"></p>

                    <table class="table dept-table">
                        <thead>
                            <tr>
                                <th width="30%">部门名称</th>
                                <th width="10%">排序</th>
                                <th width="10%">状态</th>
                                <th width="18%">创建时间</th>
                                <th width="32%">操作</th>
                            </tr>
                        </thead>
                        <tbody id="deptTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="deptModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <span id="modalTitle">新增部门</span>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>上级部门：</label>
                        <select id="formParentId" class="form-input">
                            <option value="0">顶级部门</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>部门名称：<span class="required">*</span></label>
                        <input type="text" id="formDeptName" class="form-input" placeholder="请输入部门名称">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>负责人：</label>
                        <input type="text" id="formLeader" class="form-input" placeholder="请输入负责人">
                    </div>
                    <div class="form-group">
                        <label>联系电话：</label>
                        <input type="text" id="formPhone" class="form-input" placeholder="请输入联系电话">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>邮箱：</label>
                        <input type="email" id="formEmail" class="form-input" placeholder="请输入邮箱">
                    </div>
                    <div class="form-group">
                        <label>排序：</label>
                        <input type="number" id="formSort" class="form-input" value="0" min="0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>状态：</label>
                        <select id="formStatus" class="form-input">
                            <option value="0">正常</option>
                            <option value="1">禁用</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="submitForm()">确定</button>
            </div>
        </div>
    </div>

    <script>
        var currentUser = null;
        try {
            currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        } catch (e) {}

        if (!currentUser || !currentUser.id) {
            window.location.href = 'index.html';
        } else {
            var roleText = currentUser.role === 'ADMIN' ? '超级管理员' : '普通用户';
            var roleClass = currentUser.role === 'ADMIN' ? 'role-admin' : 'role-user';
            document.getElementById('userDisplay').innerHTML =
                '欢迎，<strong>' + currentUser.username + '</strong> <span class="role-tag ' + roleClass + '">' + roleText + '</span> &nbsp; ';
        }

        var deptTree = [];
        var expandedIds = new Set();
        var allExpanded = false;
        var editMode = false;
        var editingId = null;

        function logout() {
            fetch('/api/user/logout', { method: 'POST', credentials: 'include' });
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        function showMsg(text, type) {
            var msg = document.getElementById('listMsg');
            msg.textContent = text;
            msg.className = 'message ' + (type || 'success');
            if (text) {
                setTimeout(function() {
                    msg.textContent = '';
                    msg.className = 'message';
                }, 3000);
            }
        }

        function initDefaultExpand() {
            expandedIds.clear();
            if (deptTree && deptTree.length > 0) {
                deptTree.forEach(function(d) {
                    if (d.children && d.children.length > 0) {
                        expandedIds.add(d.deptId);
                    }
                });
            }
        }

        function loadDeptTree() {
            var name = document.getElementById('searchName').value;
            var status = document.getElementById('searchStatus').value;
            var params = {};
            if (name) params.deptName = name;
            if (status) params.status = status;

            fetch('/api/system/dept/tree', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(params)
            })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    if (!result.success) {
                        if (result.message === '请先登录') {
                            window.location.href = 'index.html';
                            return;
                        }
                        showMsg(result.message, 'error');
                        return;
                    }
                    deptTree = result.data || [];
                    if (expandedIds.size === 0) {
                        initDefaultExpand();
                    }
                    renderTree();
                })
                .catch(function() {
                    showMsg('加载失败', 'error');
                });
        }

        function renderTree() {
            var tbody = document.getElementById('deptTableBody');
            tbody.innerHTML = '';
            renderLevel(deptTree, tbody, 0);
        }

        function renderLevel(list, tbody, level) {
            list.forEach(function(dept) {
                var hasChildren = dept.children && dept.children.length > 0;
                var isExpanded = expandedIds.has(dept.deptId);
                var tr = document.createElement('tr');
                tr.setAttribute('data-id', dept.deptId);

                var nameHtml = '';
                nameHtml += '<span class="tree-indent" style="padding-left:' + (level * 28) + 'px;"></span>';
                if (hasChildren) {
                    nameHtml += '<span class="tree-toggle" onclick="toggleNode(' + dept.deptId + ')">' +
                        (isExpanded ? '▼' : '▶') + '</span>';
                } else {
                    nameHtml += '<span class="tree-placeholder"></span>';
                }
                nameHtml += '<span class="dept-name">' + dept.deptName + '</span>';

                var statusClass = dept.status === '0' ? 'status-normal' : 'status-disabled';
                var statusText = dept.status === '0' ? '正常' : '禁用';

                var isRoot = dept.parentId === 0 || dept.parentId === null;
                var actionHtml = '';
                actionHtml += '<a class="link-btn link-edit" onclick="openEditModal(' + dept.deptId + ')">✏️ 修改</a>';
                actionHtml += '<a class="link-btn link-add" onclick="openAddModal(' + dept.deptId + ', \'' + dept.deptName + '\')">➕ 新增</a>';
                if (!isRoot) {
                    actionHtml += '<a class="link-btn link-delete" onclick="deleteDept(' + dept.deptId + ')">🗑️ 删除</a>';
                }
                actionHtml += '<a class="link-btn link-status" onclick="changeStatus(' + dept.deptId + ', \'' + (dept.status === '0' ? '1' : '0') + '\')">' +
                    (dept.status === '0' ? '⏸️ 禁用' : '▶️ 启用') + '</a>';

                tr.innerHTML =
                    '<td>' + nameHtml + '</td>' +
                    '<td><input type="number" class="order-input" value="' + (dept.sort || 0) + '" min="0" data-id="' + dept.deptId + '"></td>' +
                    '<td><span class="status-tag ' + statusClass + '">' + statusText + '</span></td>' +
                    '<td>' + (dept.createTime || '') + '</td>' +
                    '<td>' + actionHtml + '</td>';
                tbody.appendChild(tr);

                if (hasChildren && isExpanded) {
                    renderLevel(dept.children, tbody, level + 1);
                }
            });
        }

        function toggleNode(id) {
            if (expandedIds.has(id)) {
                expandedIds.delete(id);
            } else {
                expandedIds.add(id);
            }
            renderTree();
        }

        function toggleAll() {
            allExpanded = !allExpanded;
            expandedIds.clear();
            if (allExpanded) {
                addAllIds(deptTree);
            }
            renderTree();
        }

        function addAllIds(list) {
            list.forEach(function(dept) {
                if (dept.children && dept.children.length > 0) {
                    expandedIds.add(dept.deptId);
                    addAllIds(dept.children);
                }
            });
        }

        function searchDept() {
            expandedIds.clear();
            loadDeptTree();
        }

        function resetSearch() {
            document.getElementById('searchName').value = '';
            document.getElementById('searchStatus').value = '';
            expandedIds.clear();
            loadDeptTree();
        }

        function buildParentOptions(selectedId, excludeId) {
            var select = document.getElementById('formParentId');
            select.innerHTML = '<option value="0">顶级部门</option>';
            function addOptions(list, level) {
                list.forEach(function(dept) {
                    if (excludeId && dept.deptId === excludeId) return;
                    var prefix = '';
                    for (var i = 0; i < level; i++) prefix += '　';
                    var opt = document.createElement('option');
                    opt.value = dept.deptId;
                    opt.textContent = prefix + dept.deptName;
                    if (selectedId && selectedId == dept.deptId) opt.selected = true;
                    select.appendChild(opt);
                    if (dept.children && dept.children.length > 0) {
                        addOptions(dept.children, level + 1);
                    }
                });
            }
            addOptions(deptTree, 0);
        }

        function openAddModal(parentId, parentName) {
            editMode = false;
            editingId = null;
            var title = '新增部门';
            if (parentName) title += ' - 父级：' + parentName;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('formDeptName').value = '';
            document.getElementById('formLeader').value = '';
            document.getElementById('formPhone').value = '';
            document.getElementById('formEmail').value = '';
            document.getElementById('formSort').value = '0';
            document.getElementById('formStatus').value = '0';
            buildParentOptions(parentId || 0, null);
            document.getElementById('deptModal').style.display = 'block';
        }

        function openEditModal(id) {
            fetch('/api/system/dept/' + id, {
                credentials: 'include'
            })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    if (!result.success || !result.data) {
                        showMsg('获取部门信息失败', 'error');
                        return;
                    }
                    var dept = result.data;
                    editMode = true;
                    editingId = id;
                    document.getElementById('modalTitle').textContent = '修改部门';
                    document.getElementById('formDeptName').value = dept.deptName || '';
                    document.getElementById('formLeader').value = dept.leader || '';
                    document.getElementById('formPhone').value = dept.phone || '';
                    document.getElementById('formEmail').value = dept.email || '';
                    document.getElementById('formSort').value = dept.sort || 0;
                    document.getElementById('formStatus').value = dept.status || '0';
                    buildParentOptions(dept.parentId || 0, id);
                    document.getElementById('deptModal').style.display = 'block';
                });
        }

        function closeModal() {
            document.getElementById('deptModal').style.display = 'none';
        }

        function submitForm() {
            var name = document.getElementById('formDeptName').value.trim();
            if (!name) {
                showMsg('请输入部门名称', 'error');
                return;
            }
            var data = {
                parentId: parseInt(document.getElementById('formParentId').value) || 0,
                deptName: name,
                leader: document.getElementById('formLeader').value.trim(),
                phone: document.getElementById('formPhone').value.trim(),
                email: document.getElementById('formEmail').value.trim(),
                sort: parseInt(document.getElementById('formSort').value) || 0,
                status: document.getElementById('formStatus').value
            };
            var url;
            if (editMode) {
                data.deptId = editingId;
                url = '/api/system/dept/update';
            } else {
                url = '/api/system/dept/create';
            }
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(data)
            })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    showMsg(result.message, result.success ? 'success' : 'error');
                    if (result.success) {
                        closeModal();
                        loadDeptTree();
                    }
                });
        }

        function deleteDept(id) {
            if (!confirm('确定要删除该部门吗？\n注意：存在子部门或已关联用户的部门不可删除。')) return;
            fetch('/api/system/dept/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ deptId: id })
            })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    showMsg(result.message, result.success ? 'success' : 'error');
                    if (result.success) {
                        loadDeptTree();
                    }
                });
        }

        function changeStatus(id, status) {
            var action = status === '0' ? '启用' : '禁用';
            if (!confirm('确定要' + action + '该部门吗？')) return;
            fetch('/api/system/dept/changeStatus', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ deptId: id, status: status })
            })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    showMsg(result.message, result.success ? 'success' : 'error');
                    if (result.success) {
                        loadDeptTree();
                    }
                });
        }

        function saveOrder() {
            var inputs = document.querySelectorAll('.order-input');
            var list = [];
            inputs.forEach(function(inp) {
                list.push({
                    deptId: parseInt(inp.getAttribute('data-id')),
                    sort: parseInt(inp.value) || 0
                });
            });
            fetch('/api/system/dept/saveSortBatch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(list)
            })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    showMsg(result.message, result.success ? 'success' : 'error');
                    if (result.success) {
                        loadDeptTree();
                    }
                });
        }

        window.onclick = function(event) {
            var modal = document.getElementById('deptModal');
            if (event.target == modal) {
                closeModal();
            }
        };

        loadDeptTree();
    </script>
</body>
</html>
