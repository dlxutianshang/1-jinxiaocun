<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>角色管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="layout-body">
    <div class="layout">
        <div class="sidebar">
            <div class="logo">
                <h2>进销存系统</h2>
            </div>
            <ul class="menu">
                <li><a href="dashboard.html" class="menu-item">🏠 首页</a></li>
                <li><a href="departments.html" class="menu-item">🏢 部门管理</a></li>
                <li><a href="users.html" class="menu-item">👥 用户管理</a></li>
                <li><a href="roles.html" class="menu-item active">🎭 角色管理</a></li>
            </ul>
        </div>
        <div class="main-content">
            <div class="top-header">
                <div class="breadcrumb">系统管理 / 角色管理</div>
                <div class="user-area">
                    <span id="userDisplay"></span>
                    <button class="btn btn-danger btn-sm" onclick="logout()">退出登录</button>
                </div>
            </div>
            <div class="page-content">
                <div class="card">
                    <p id="listMsg" class="message"></p>

                    <table class="table role-table">
                        <thead>
                            <tr>
                                <th width="40"><input type="checkbox" id="checkAll" onchange="toggleCheckAll(this)"></th>
                                <th>角色编号</th>
                                <th>角色名称</th>
                                <th>权限字符</th>
                                <th>显示顺序</th>
                                <th>状态</th>
                                <th>创建时间</th>
                            </tr>
                        </thead>
                        <tbody id="roleTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        var currentUser = null;
        try {
            currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        } catch (e) {}

        if (!currentUser || !currentUser.id) {
            window.location.href = 'index.html';
        } else {
            var roleText = currentUser.role === 'ADMIN' ? '超级管理员' : '普通用户';
            var roleClass = currentUser.role === 'ADMIN' ? 'role-admin' : 'role-user';
            document.getElementById('userDisplay').innerHTML =
                '欢迎，<strong>' + currentUser.username + '</strong> <span class="role-tag ' + roleClass + '">' + roleText + '</span> &nbsp; ';
        }

        var selectedIds = [];
        var roleListCache = [];

        function logout() {
            fetch('/api/user/logout', { method: 'POST', credentials: 'include' });
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        function showMsg(text, type) {
            var msg = document.getElementById('listMsg');
            msg.textContent = text;
            msg.className = 'message ' + (type || 'success');
            if (text) {
                setTimeout(function() {
                    msg.textContent = '';
                    msg.className = 'message';
                }, 3000);
            }
        }

        function formatDateTime(datetime) {
            if (!datetime) return '';
            datetime = datetime.replace('T', ' ').substring(0, 19);
            return datetime;
        }

        function loadRoles() {
            fetch('/api/system/role/list', {
                credentials: 'include'
            })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    if (!result.success) {
                        if (result.message === '请先登录') {
                            window.location.href = 'index.html';
                            return;
                        }
                        showMsg(result.message, 'error');
                        return;
                    }
                    var list = result.data || [];
                    roleListCache = list;
                    selectedIds = [];
                    document.getElementById('checkAll').checked = false;
                    renderRoleList(list);
                })
                .catch(function() {
                    showMsg('加载失败', 'error');
                });
        }

        function renderRoleList(list) {
            var tbody = document.getElementById('roleTableBody');
            tbody.innerHTML = '';
            if (list.length === 0) {
                var tr = document.createElement('tr');
                tr.innerHTML = '<td colspan="7" style="text-align:center; color:#909399; padding:40px 0;">暂无数据</td>';
                tbody.appendChild(tr);
                return;
            }

            list.forEach(function(role) {
                var tr = document.createElement('tr');
                var isChecked = selectedIds.indexOf(role.id) >= 0;
                var isEnabled = role.status === '0';
                var statusClass = isEnabled ? 'status-normal' : 'status-disabled';
                var statusText = isEnabled ? '正常' : '停用';
                var statusHtml = '<span class="status-tag ' + statusClass + '">' + statusText + '</span>';

                tr.innerHTML =
                    '<td><input type="checkbox" class="role-checkbox" value="' + role.id + '" ' + (isChecked ? 'checked' : '') + ' onchange="handleCheckboxChange()"></td>' +
                    '<td>' + role.id + '</td>' +
                    '<td>' + (role.name || '') + '</td>' +
                    '<td><code style="background:#f5f5f5; padding:2px 6px; border-radius:3px; color:#c7254e;">' + (role.roleKey || '') + '</code></td>' +
                    '<td>' + (role.sort != null ? role.sort : 0) + '</td>' +
                    '<td>' + statusHtml + '</td>' +
                    '<td>' + formatDateTime(role.createTime) + '</td>';
                tbody.appendChild(tr);
            });
        }

        function handleCheckboxChange() {
            selectedIds = [];
            var checkboxes = document.querySelectorAll('.role-checkbox');
            checkboxes.forEach(function(cb) {
                if (cb.checked) {
                    selectedIds.push(parseInt(cb.value));
                }
            });
            var checkAll = document.getElementById('checkAll');
            checkAll.checked = checkboxes.length > 0 && selectedIds.length === checkboxes.length;
        }

        function toggleCheckAll(checkbox) {
            var checkboxes = document.querySelectorAll('.role-checkbox');
            selectedIds = [];
            checkboxes.forEach(function(cb) {
                cb.checked = checkbox.checked;
                if (checkbox.checked) {
                    selectedIds.push(parseInt(cb.value));
                }
            });
        }

        window.onclick = function(event) {
        };

        loadRoles();
    </script>
</body>
</html>
